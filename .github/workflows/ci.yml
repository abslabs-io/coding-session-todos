name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Package extension
        run: npx vsce package --out claude-todos.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: claude-todos-vsix
          path: claude-todos.vsix
