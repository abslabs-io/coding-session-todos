name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - run: npm run build

      - name: Package extension
        run: npx vsce package --out claude-todos.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: claude-todos-vsix
          path: claude-todos.vsix
